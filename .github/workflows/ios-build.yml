name: iOS build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          ls /Applications | grep -i Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show project schemes
        run: xcodebuild -list -project GoalsApp.xcodeproj

      - name: Pick scheme and simulator
        run: |
          set -x
          SCHEME=$(xcodebuild -list -project GoalsApp.xcodeproj -json | jq -r '.project.schemes[0]')
          if [ -z "$SCHEME" ] || [ "$SCHEME" = "null" ]; then
            SCHEME="GoalsApp"
          fi
          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"

          xcrun simctl list devices available
          # Pick by ID on the newest installed iOS runtime, not by name — a device
          # model's simulator image isn't guaranteed to exist for every runtime
          # (e.g. "iPhone 15 Pro" tops out at iOS 17.5 on some runners, while
          # xcodebuild defaults to the latest SDK when no OS is given, so a
          # name-only match can point at an OS that model never got).
          DEVICE_ID=$(xcrun simctl list devices available --json | jq -r '
            .devices
            | to_entries
            | map(select(.key | test("iOS")))
            | sort_by(.key)
            | last
            | .value
            | map(select(.name | test("iPhone")))
            | first
            | .id
          ')
          if [ -z "$DEVICE_ID" ] || [ "$DEVICE_ID" = "null" ]; then
            echo "No iPhone simulator found on this runner" >&2
            exit 1
          fi
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Build for simulator
        run: |
          set -x
          echo "Building scheme '$SCHEME' for device id '$DEVICE_ID'"
          xcodebuild build \
            -project GoalsApp.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot simulator and capture screenshot
        run: |
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 5
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "GoalsApp.app" -path "*iphonesimulator*" | head -1)
          echo "App path: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"
          xcrun simctl launch booted com.goalsapp.ios
          sleep 3
          xcrun simctl io booted screenshot screenshot.png

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshot
          path: screenshot.png
