name: iOS build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Build for simulator
        run: |
          xcodebuild build \
            -project GoalsApp.xcodeproj \
            -scheme GoalsApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot simulator and capture screenshot
        run: |
          xcrun simctl boot "iPhone 15" || true
          sleep 5
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "GoalsApp.app" -path "*iphonesimulator*" | head -1)
          echo "App path: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"
          xcrun simctl launch booted com.goalsapp.ios
          sleep 3
          xcrun simctl io booted screenshot screenshot.png

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshot
          path: screenshot.png
