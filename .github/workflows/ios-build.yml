name: iOS build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select latest available Xcode
        run: |
          ls /Applications | grep -i Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show project schemes
        run: xcodebuild -list -project GoalsApp.xcodeproj

      - name: Pick scheme and simulator
        run: |
          set -x
          SCHEME=$(xcodebuild -list -project GoalsApp.xcodeproj -json | jq -r '.project.schemes[0]')
          if [ -z "$SCHEME" ] || [ "$SCHEME" = "null" ]; then
            SCHEME="GoalsApp"
          fi
          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"

          # Parse the plain-text listing directly instead of --json — the JSON
          # key format didn't match what we assumed (returned null for a
          # filter that should have matched), so use the format we can see
          # actually works. Sections print oldest-to-newest, so the last
          # "-- iOS X.Y --" header is the newest runtime.
          xcrun simctl list devices available > /tmp/sims.txt
          cat /tmp/sims.txt
          SECTION_LINE=$(grep -n '^-- iOS ' /tmp/sims.txt | tail -1 | cut -d: -f1)
          DEVICE_ID=$(tail -n +"$SECTION_LINE" /tmp/sims.txt \
            | grep -m1 'iPhone' \
            | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}')
          if [ -z "$DEVICE_ID" ]; then
            echo "No iPhone simulator found on this runner" >&2
            exit 1
          fi
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Build for simulator
        run: |
          set -x
          echo "Building scheme '$SCHEME' for device id '$DEVICE_ID'"
          xcodebuild build \
            -project GoalsApp.xcodeproj \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Boot simulator and capture screenshot
        run: |
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 5
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "GoalsApp.app" -path "*iphonesimulator*" | head -1)
          echo "App path: $APP_PATH"
          xcrun simctl install booted "$APP_PATH"
          xcrun simctl launch booted com.goalsapp.ios
          sleep 3
          xcrun simctl io booted screenshot screenshot.png

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshot
          path: screenshot.png
