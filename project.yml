name: GoalsApp
options:
  bundleIdPrefix: com.goalsapp
  deploymentTarget:
    iOS: "17.0"

targets:
  GoalsApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/GoalsApp
    info:
      path: Sources/GoalsApp/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.goalsapp.ios
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
